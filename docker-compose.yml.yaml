version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kkkarwash_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: kkkarwash
      MYSQL_USER: kkkuser
      MYSQL_PASSWORD: kkkpass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - kkkarwash_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  backend:
    build: .
    container_name: kkkarwash_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/kkkarwash
      DATABASE_USER: kkkuser
      DATABASE_PASSWORD: kkkpass123
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey1234567890}
      JWT_EXPIRATION: 86400000
    networks:
      - kkkarwash_network

volumes:
  mysql_data:

networks:
  kkkarwash_network:
    driver: bridge